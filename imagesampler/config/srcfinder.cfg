[defaults]
image_class: CMFImage
tile_dim: [256,256]
pos_centroids: True # only sample 1 tile / positive candidate id centered on plume (lat,lon)
neg_centroids: False # sample coords within cmflab roi bounds / candidate
rgb_required: False

img_suffix: _img # matches orthoprocessed cmf/cmfm images
img_match: *_c*mf_v* # matches unimodal cmf

lab_suffix: _img_mask.png
lab_match: ${img_match} # label images share img_prefix values

[ang_4c_2015]
fig_tpose: True 
img_path: /example/ang_4c_2015/cmfimg
lab_path: /example/ang_4c_2015/cmflab
out_path: ${lab_path}/tiles256

